spring.application.name=moviecommunity

# ------------------------------------------------------------
# Database (Supabase PostgreSQL)
# ------------------------------------------------------------
# Values pulled from environment variables so nothing secret
# ever lands in source control. Set these either in your shell,
# in application-local.properties (gitignored), or via
# IntelliJ's "Edit Configurations" -> Environment variables.
# ------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_HOST:db.sucnbqpqtbejivvfmviu.supabase.co}:${SUPABASE_DB_PORT:5432}/${SUPABASE_DB_NAME:postgres}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
# We created the schema by hand in Supabase (see schema.sql),
# so Hibernate only validates against it -- never auto-creates
# or drops tables. Safer for a shared DB.
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Avoid holding a DB connection open during view rendering
spring.jpa.open-in-view=false

# ------------------------------------------------------------
# HikariCP pool -- keep it small, Supabase free tier caps
# connections hard (around 60 total across the whole project).
# ------------------------------------------------------------
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000

# ------------------------------------------------------------
# OMDb API
# ------------------------------------------------------------
omdb.api.key=${OMDB_API_KEY:}
omdb.api.base-url=https://www.omdbapi.com

# ------------------------------------------------------------
# Thymeleaf (dev mode -- hot reload of templates)
# ------------------------------------------------------------
spring.thymeleaf.cache=false

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
logging.level.com.fyp.moviecommunity=DEBUG
logging.level.org.springframework.security=INFO

# ------------------------------------------------------------
# For You algorithm (tunable)
# ------------------------------------------------------------
# diversity ratio: 4 means "4 popular slots, 1 quiet-pick slot per cycle"
foryou.diversity-ratio=4
foryou.pool-size=100
foryou.weight.comment=3.0
foryou.weight.movie-popularity=1.0
foryou.weight.age-penalty=0.2

# Label threshold: a post is "popular" if its comment count >= ratio * peak,
# where peak = max comments on any post from the last 7 days.
# At 0.2, with a peak of 10 comments, anything with >=2 comments is popular.
foryou.popular-threshold.ratio=0.2
foryou.popular-threshold.window-days=7

# ------------------------------------------------------------
# Demo data seeding
# ------------------------------------------------------------
# Flip to false to skip seeding even on an empty DB
app.demo-data.enabled=true
