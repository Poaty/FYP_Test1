<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New watch party · Movie Community</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4" style="max-width: 760px;">
    <h1 class="h3 mb-1">Schedule a watch party</h1>
    <p class="text-muted mb-4">Pick the film first.</p>

    <div th:if="${param.error}" class="alert alert-warning">
        Couldn't find that one — search again.
    </div>

    <form th:action="@{/events/new}" method="get" class="d-flex gap-2 mb-4">
        <input type="search" name="q" th:value="${q}"
               class="form-control form-control-lg"
               placeholder="e.g. Lord of the Rings" autofocus required>
        <button type="submit" class="btn btn-primary px-4">Search</button>
    </form>

    <div th:if="${results != null and #lists.isEmpty(results)}" class="alert alert-light border">
        No results for <strong th:text="'&quot;' + ${q} + '&quot;'">"q"</strong>.
    </div>

    <div th:if="${results != null and not #lists.isEmpty(results)}">
        <p class="text-muted small mb-3">Pick the one you mean:</p>
        <div class="row g-3">
            <div th:each="item : ${results}" class="col-md-6">
                <div class="card h-100 shadow-sm border-0">
                    <div class="row g-0 h-100">
                        <div class="col-4">
                            <img th:if="${item.poster != null and item.poster != 'N/A'}"
                                 th:src="${item.poster}" class="img-fluid rounded-start h-100"
                                 style="object-fit: cover; width: 100%;" alt="poster">
                            <div th:unless="${item.poster != null and item.poster != 'N/A'}"
                                 class="bg-secondary rounded-start h-100 d-flex align-items-center justify-content-center text-white small">
                                no poster
                            </div>
                        </div>
                        <div class="col-8">
                            <div class="card-body d-flex flex-column h-100">
                                <h6 class="card-title mb-1" th:text="${item.title}">Title</h6>
                                <p class="small text-muted mb-3" th:text="${item.year}">Year</p>
                                <a th:href="@{/events/new/details(imdbId=${item.imdbId})}"
                                   class="btn btn-sm btn-primary mt-auto align-self-start">
                                    Schedule a watch
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
