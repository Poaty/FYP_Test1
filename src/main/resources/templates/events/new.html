<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New watch party · Movie Community</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4" style="max-width: 760px;">
    <h1 class="h3 mb-1">Schedule a watch party</h1>
    <p class="text-muted mb-4">Pick the film first.</p>

    <div th:if="${param.error}" class="alert alert-warning">
        Couldn't find that one — search again.
    </div>

    <form th:action="@{/events/new}" method="get" class="d-flex gap-2 mb-4">
        <input type="search" name="q" th:value="${q}"
               class="form-control form-control-lg"
               placeholder="e.g. Lord of the Rings" autofocus required>
        <button type="submit" class="btn btn-primary px-4">Search</button>
    </form>

    <div th:if="${searchPage != null and searchPage.empty}" class="alert alert-light border">
        No results for <strong th:text="'&quot;' + ${q} + '&quot;'">"q"</strong>.
    </div>

    <div th:if="${searchPage != null and not searchPage.empty}">
        <p class="text-muted small mb-3">
            <span th:text="${searchPage.totalResults}">N</span>
            <span th:text="${searchPage.totalResults == 1} ? 'result' : 'results'">results</span>.
            Page <span th:text="${searchPage.currentPage}">1</span>
            of <span th:text="${searchPage.totalPages}">N</span>. Pick the one you mean:
        </p>
        <div class="row g-3">
            <div th:each="item : ${searchPage.items}" class="col-md-6">
                <div class="card h-100 shadow-sm border-0">
                    <div class="row g-0 h-100">
                        <div class="col-4">
                            <img th:if="${item.poster != null and item.poster != 'N/A'}"
                                 th:src="${item.poster}"
                                 onerror="this.src='/img/no-poster.svg'; this.onerror=null;"
                                 class="img-fluid rounded-start h-100"
                                 style="object-fit: cover; width: 100%;" alt="poster">
                            <img th:unless="${item.poster != null and item.poster != 'N/A'}"
                                 th:src="@{/img/no-poster.svg}" alt="No poster available"
                                 class="img-fluid rounded-start h-100"
                                 style="object-fit: cover; width: 100%;">
                        </div>
                        <div class="col-8">
                            <div class="card-body d-flex flex-column h-100">
                                <h6 class="card-title mb-1" th:text="${item.title}">Title</h6>
                                <p class="small text-muted mb-3" th:text="${item.year}">Year</p>
                                <a th:href="@{/events/new/details(imdbId=${item.imdbId})}"
                                   class="btn btn-sm btn-primary mt-auto align-self-start">
                                    Schedule a watch
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${searchPage.totalPages > 1}"
             class="d-flex justify-content-between align-items-center mt-4">
            <a th:if="${searchPage.hasPrevious()}"
               th:href="@{/events/new(q=${q}, page=${searchPage.currentPage - 1})}"
               class="btn btn-outline-secondary">← Previous</a>
            <span th:unless="${searchPage.hasPrevious()}" class="btn btn-outline-secondary disabled">← Previous</span>

            <span class="text-muted small">
                Page <span th:text="${searchPage.currentPage}">1</span>
                / <span th:text="${searchPage.totalPages}">N</span>
            </span>

            <a th:if="${searchPage.hasNext()}"
               th:href="@{/events/new(q=${q}, page=${searchPage.currentPage + 1})}"
               class="btn btn-outline-secondary">Next →</a>
            <span th:unless="${searchPage.hasNext()}" class="btn btn-outline-secondary disabled">Next →</span>
        </nav>
    </div>
</main>

</body>
</html>
