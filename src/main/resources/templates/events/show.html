<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${event.title} + ' · Movie Community'">Event</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4" style="max-width: 760px;">

    <!-- Event header -->
    <div class="card border-0 shadow-sm mb-3">
        <div class="row g-0">
            <div class="col-md-3">
                <img th:if="${event.movie.posterUrl != null}" th:src="${event.movie.posterUrl}"
                     class="img-fluid rounded-start" alt="poster"
                     style="width: 100%; object-fit: cover;">
                <div th:unless="${event.movie.posterUrl != null}"
                     class="bg-secondary h-100 d-flex align-items-center justify-content-center text-white p-4">
                    no poster
                </div>
            </div>
            <div class="col-md-9">
                <div class="card-body">
                    <h4 class="card-title mb-1" th:text="${event.title}">Event title</h4>
                    <p class="text-muted small mb-2">
                        <strong th:text="${event.movie.title}">Movie</strong>
                        <span th:if="${event.movie.year != null}" th:text="' (' + ${event.movie.year} + ')'"> (year)</span>
                        · hosted by <strong th:text="${event.host.username}">host</strong>
                    </p>
                    <p class="mb-2 d-flex align-items-center gap-2 flex-wrap">
                        <span class="badge bg-secondary"
                              th:text="${#temporals.format(event.scheduledFor, 'EEEE d MMMM yyyy, HH:mm')}">when</span>
                        <!-- Host can delete their own event -->
                        <form th:if="${iAmHost}"
                              th:action="@{'/events/' + ${event.id} + '/delete'}"
                              method="post" class="m-0"
                              onsubmit="return confirm('Cancel this watch party and remove its whole thread?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Cancel event</button>
                        </form>
                        <!-- Admin can delete any event -->
                        <form sec:authorize="hasRole('ADMIN')"
                              th:unless="${iAmHost}"
                              th:action="@{'/admin/events/' + ${event.id} + '/delete'}"
                              method="post" class="m-0">
                            <input type="hidden" name="reason">
                            <button type="submit" class="btn btn-sm btn-outline-warning"
                                    onclick="return askReason(this.form, 'Delete this watch party (admin)?');">
                                Delete event (admin)
                            </button>
                        </form>
                    </p>
                    <p th:if="${event.description != null and !#strings.isEmpty(event.description)}"
                       class="card-text small text-muted mb-0" style="white-space: pre-wrap;"
                       th:text="${event.description}">description</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Attendance + RSVP -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
                <h2 class="h6 mb-0">
                    <span th:text="${attendingCount}">0</span>
                    <span th:text="${attendingCount == 1} ? 'person going' : 'people going'">people going</span>
                </h2>
                <form th:action="@{'/events/' + ${event.id} + '/rsvp'}" method="post" class="m-0">
                    <button th:if="${iAmAttending}" type="submit" class="btn btn-outline-secondary btn-sm">
                        ✓ Going (click to cancel)
                    </button>
                    <button th:unless="${iAmAttending}" type="submit" class="btn btn-primary btn-sm">
                        I'm going
                    </button>
                </form>
            </div>
            <p th:if="${#lists.isEmpty(attendees)}" class="text-muted small mb-0">
                Nobody yet. Be the first to RSVP.
            </p>
            <p th:unless="${#lists.isEmpty(attendees)}" class="small mb-0">
                <span th:each="a, iter : ${attendees}">
                    <strong th:text="${a.user.username}">user</strong><span th:unless="${iter.last}">, </span>
                </span>
            </p>
        </div>
    </div>

    <!-- Comments -->
    <h2 class="h5 mb-3" id="comments">
        <span th:text="${#lists.size(eventComments)}">0</span>
        <span th:text="${#lists.size(eventComments) == 1} ? 'message' : 'messages'">messages</span>
    </h2>

    <div th:if="${#lists.isEmpty(eventComments)}" class="text-muted small mb-4">
        No messages yet. Drop your first thought.
    </div>

    <div th:each="c : ${eventComments}" class="card border-0 shadow-sm mb-2">
        <div class="card-body py-3">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <strong class="small" th:text="${c.user.username}">author</strong>
                <div class="d-flex align-items-center gap-2">
                    <span class="text-muted small"
                          th:text="${#temporals.format(c.createdAt, 'd MMM, HH:mm')}">date</span>
                    <!-- Author of this message can delete -->
                    <form th:if="${currentUserId != null and currentUserId == c.user.id}"
                          th:action="@{'/events/' + ${event.id} + '/comments/' + ${c.id} + '/delete'}"
                          method="post" class="m-0"
                          onsubmit="return confirm('Delete your message?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger py-0 px-2">Delete</button>
                    </form>
                    <!-- Admin can delete any message (with reason) -->
                    <form sec:authorize="hasRole('ADMIN')"
                          th:unless="${currentUserId != null and currentUserId == c.user.id}"
                          th:action="@{'/admin/event-comments/' + ${c.id} + '/delete'}"
                          method="post" class="m-0">
                        <input type="hidden" name="reason">
                        <button type="submit" class="btn btn-sm btn-outline-warning py-0 px-2"
                                onclick="return askReason(this.form, 'Delete this message (admin)?');">
                            Delete (admin)
                        </button>
                    </form>
                </div>
            </div>
            <p class="mb-0" style="white-space: pre-wrap;" th:text="${c.content}">message</p>
        </div>
    </div>

    <!-- Admin reason-prompt helper. -->
    <script th:inline="javascript">
        function askReason(form, msg) {
            var r = prompt(msg + '\n\nReason for moderation:');
            if (r === null) return false;
            r = r.trim();
            if (r.length < 3) { alert('Please enter a reason (3+ characters).'); return false; }
            if (r.length > 500) { alert('Keep the reason under 500 characters.'); return false; }
            form.reason.value = r;
            return true;
        }
    </script>

    <!-- New comment form -->
    <form th:action="@{'/events/' + ${event.id} + '/comments'}"
          th:object="${commentForm}" method="post" class="mt-4">
        <div class="mb-2">
            <label for="content" class="form-label fw-semibold">Add a message</label>
            <textarea id="content" th:field="*{content}" rows="3"
                      class="form-control"
                      th:classappend="${#fields.hasErrors('content')} ? 'is-invalid' : ''"
                      placeholder="Suggestions, hype, hot takes -- whatever moves you to type."></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('content')}"
                 th:errors="*{content}">Content error</div>
        </div>
        <div class="d-flex justify-content-between align-items-center">
            <a th:href="@{/events}" class="btn btn-link px-0">← All watch parties</a>
            <button type="submit" class="btn btn-primary">Send</button>
        </div>
    </form>
</main>

</body>
</html>
