<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Schedule: ' + ${movie.title}">Schedule</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4" style="max-width: 760px;">

    <!-- Selected movie -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="row g-0">
            <div class="col-md-3">
                <img th:if="${movie.posterUrl != null}" th:src="${movie.posterUrl}"
                     class="img-fluid rounded-start" alt="poster"
                     onerror="this.src='/img/no-poster.svg'; this.onerror=null;"
                     style="width: 100%; object-fit: cover;">
                <img th:unless="${movie.posterUrl != null}"
                     th:src="@{/img/no-poster.svg}" alt="No poster available"
                     class="img-fluid rounded-start"
                     style="width: 100%; object-fit: cover;">
            </div>
            <div class="col-md-9">
                <div class="card-body">
                    <h5 class="card-title mb-1" th:text="${movie.title}">Title</h5>
                    <p class="text-muted small mb-2">
                        <span th:if="${movie.year != null}" th:text="${movie.year}">year</span>
                        <span th:if="${movie.genre != null}" th:text="' · ' + ${movie.genre}"> · genre</span>
                    </p>
                    <p class="card-text small text-muted mb-0" th:text="${movie.plot}">plot</p>
                </div>
            </div>
        </div>
    </div>

    <h2 class="h5 mb-3">Watch party details</h2>

    <form th:action="@{/events}" th:object="${eventForm}" method="post">
        <input type="hidden" th:field="*{imdbId}">

        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input type="text" id="title" th:field="*{title}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''"
                   placeholder="e.g. Sunday LOTR re-watch" maxlength="120">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}"
                 th:errors="*{title}">Title error</div>
        </div>

        <div class="mb-3">
            <label for="scheduledFor" class="form-label">When</label>
            <input type="datetime-local" id="scheduledFor" th:field="*{scheduledFor}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('scheduledFor')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('scheduledFor')}"
                 th:errors="*{scheduledFor}">Date error</div>
            <div class="form-text">UK time. Attendees will see this in their local zone.</div>
        </div>

        <div class="mb-4">
            <label for="description" class="form-label">Notes (optional)</label>
            <textarea id="description" th:field="*{description}" rows="4"
                      class="form-control"
                      th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : ''"
                      placeholder="Any context — which cut, which version, BYO snacks..."></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}"
                 th:errors="*{description}">Description error</div>
        </div>

        <div class="d-flex gap-2 align-items-center">
            <button type="submit" class="btn btn-primary px-4">Schedule it</button>
            <a th:href="@{/events/new}" class="btn btn-link">Pick a different film</a>
        </div>
    </form>
</main>

</body>
</html>
