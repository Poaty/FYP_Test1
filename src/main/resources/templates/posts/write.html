<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Write about ' + ${movie.title}">Write</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4" style="max-width: 760px;">

    <!-- The movie they picked -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="row g-0">
            <div class="col-md-3">
                <img th:if="${movie.posterUrl != null}" th:src="${movie.posterUrl}"
                     class="img-fluid rounded-start" alt="poster"
                     style="width: 100%; object-fit: cover;">
                <div th:unless="${movie.posterUrl != null}"
                     class="bg-secondary h-100 d-flex align-items-center justify-content-center text-white p-4">
                    no poster
                </div>
            </div>
            <div class="col-md-9">
                <div class="card-body">
                    <h5 class="card-title mb-1" th:text="${movie.title}">Title</h5>
                    <p class="text-muted small mb-2">
                        <span th:if="${movie.year != null}" th:text="${movie.year}">year</span>
                        <span th:if="${movie.genre != null}" th:text="' · ' + ${movie.genre}"> · genre</span>
                        <span th:if="${movie.director != null}" th:text="' · dir. ' + ${movie.director}"> · dir</span>
                    </p>
                    <p class="card-text small text-muted" th:text="${movie.plot}">plot</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Write form -->
    <form th:action="@{/posts}" th:object="${postForm}" method="post">
        <input type="hidden" th:field="*{imdbId}">

        <div class="mb-3">
            <label for="content" class="form-label h5">What did you really think?</label>
            <textarea id="content" th:field="*{content}" rows="10"
                      class="form-control"
                      th:classappend="${#fields.hasErrors('content')} ? 'is-invalid' : ''"
                      placeholder="No likes, no scores, no five-star rating. Just what actually stuck with you."></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('content')}"
                 th:errors="*{content}">Content error</div>
            <div class="form-text">Up to 5000 characters.</div>
        </div>

        <div class="d-flex gap-2 align-items-center">
            <button type="submit" class="btn btn-primary px-4">Post it</button>
            <a th:href="@{/posts/new}" class="btn btn-link">Pick a different movie</a>
        </div>
    </form>
</main>

</body>
</html>
