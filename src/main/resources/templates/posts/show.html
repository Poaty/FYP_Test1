<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${post.movie.title} + ' · Movie Community'">Post</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4" style="max-width: 760px;">

    <!-- Movie card -->
    <div class="card border-0 shadow-sm mb-3">
        <div class="row g-0">
            <div class="col-md-3">
                <img th:if="${post.movie.posterUrl != null}" th:src="${post.movie.posterUrl}"
                     class="img-fluid rounded-start" alt="poster"
                     onerror="this.src='/img/no-poster.svg'; this.onerror=null;"
                     style="width: 100%; object-fit: cover;">
                <img th:unless="${post.movie.posterUrl != null}"
                     th:src="@{/img/no-poster.svg}" alt="No poster available"
                     class="img-fluid rounded-start"
                     style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div class="col-md-9">
                <div class="card-body">
                    <h4 class="card-title mb-1" th:text="${post.movie.title}">Title</h4>
                    <p class="text-muted small mb-2">
                        <span th:if="${post.movie.year != null}" th:text="${post.movie.year}">year</span>
                        <span th:if="${post.movie.genre != null}" th:text="' · ' + ${post.movie.genre}"> · genre</span>
                        <span th:if="${post.movie.director != null}" th:text="' · dir. ' + ${post.movie.director}"> · dir</span>
                    </p>
                    <p class="card-text small text-muted mb-0" th:text="${post.movie.plot}">plot</p>
                </div>
            </div>
        </div>
    </div>

    <!-- The post itself -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <strong th:text="${post.user.username}">author</strong>
                <div class="d-flex align-items-center gap-2">
                    <span class="text-muted small"
                          th:text="${#temporals.format(post.createdAt, 'd MMM yyyy, HH:mm')}">date</span>
                    <!-- Author can delete their own post -->
                    <form th:if="${iAmPostAuthor}"
                          th:action="@{'/posts/' + ${post.id} + '/delete'}"
                          method="post" class="m-0"
                          onsubmit="return confirm('Delete your post and all its comments?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                    </form>
                    <!-- Admin can delete any post (different endpoint, requires reason) -->
                    <form sec:authorize="hasRole('ADMIN')"
                          th:unless="${iAmPostAuthor}"
                          th:action="@{'/admin/posts/' + ${post.id} + '/delete'}"
                          method="post" class="m-0">
                        <input type="hidden" name="reason">
                        <button type="submit" class="btn btn-sm btn-outline-warning"
                                onclick="return askReason(this.form, 'Delete this post (admin)?');">
                            Delete (admin)
                        </button>
                    </form>
                </div>
            </div>
            <p class="mb-0" style="white-space: pre-wrap;" th:text="${post.content}">post content</p>
        </div>
    </div>

    <!-- Comments header -->
    <h2 class="h5 mb-3" id="comments">
        <span th:text="${totalCommentCount}">0</span>
        <span th:text="${totalCommentCount == 1} ? 'comment' : 'comments'">comments</span>
    </h2>

    <div th:if="${#lists.isEmpty(topLevelComments)}" class="text-muted small mb-4">
        No comments yet. First honest reaction?
    </div>

    <!-- Top-level comments + their replies -->
    <div th:each="c : ${topLevelComments}" th:id="'comment-' + ${c.id}" class="mb-3">

        <!-- The top-level comment itself -->
        <div class="card border-0 shadow-sm">
            <div class="card-body py-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <strong class="small" th:text="${c.user.username}">author</strong>
                    <div class="d-flex align-items-center gap-2">
                        <span class="text-muted small"
                              th:text="${#temporals.format(c.createdAt, 'd MMM, HH:mm')}">date</span>
                        <!-- Author of this comment can delete it -->
                        <form th:if="${currentUserId != null and currentUserId == c.user.id}"
                              th:action="@{'/comments/' + ${c.id} + '/delete'}"
                              method="post" class="m-0"
                              onsubmit="return confirm('Delete your comment and any replies under it?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger py-0 px-2">Delete</button>
                        </form>
                        <!-- Admin can delete any comment (different endpoint, requires reason) -->
                        <form sec:authorize="hasRole('ADMIN')"
                              th:unless="${currentUserId != null and currentUserId == c.user.id}"
                              th:action="@{'/admin/comments/' + ${c.id} + '/delete'}"
                              method="post" class="m-0">
                            <input type="hidden" name="reason">
                            <button type="submit" class="btn btn-sm btn-outline-warning py-0 px-2"
                                    onclick="return askReason(this.form, 'Delete this comment (admin)?');">
                                Delete (admin)
                            </button>
                        </form>
                    </div>
                </div>
                <p class="mb-2" style="white-space: pre-wrap;" th:text="${c.content}">comment</p>

                <!-- Reply toggler -->
                <details class="small">
                    <summary class="text-primary" style="cursor: pointer;">Reply</summary>
                    <form th:action="@{'/posts/' + ${post.id} + '/comments/' + ${c.id} + '/reply'}"
                          method="post" class="mt-2">
                        <textarea name="content" rows="2"
                                  class="form-control form-control-sm mb-2"
                                  th:classappend="${replyError != null and replyParentId == c.id} ? 'is-invalid' : ''"
                                  th:text="${replyParentId == c.id} ? ${replyDraft} : ''"
                                  placeholder="Reply..."
                                  required minlength="1" maxlength="2000"></textarea>
                        <div th:if="${replyError != null and replyParentId == c.id}"
                             class="invalid-feedback d-block" th:text="${replyError}">error</div>
                        <button type="submit" class="btn btn-sm btn-primary">Send reply</button>
                    </form>
                </details>
            </div>
        </div>

        <!-- Replies, indented under the parent -->
        <div th:if="${repliesByParent.containsKey(c.id)}" class="ms-4 mt-2">
            <div th:each="r : ${repliesByParent.get(c.id)}"
                 th:id="'comment-' + ${r.id}"
                 class="card border-0 shadow-sm mb-2">
                <div class="card-body py-2 ps-3 border-start border-3 border-secondary-subtle">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <strong class="small" th:text="${r.user.username}">replier</strong>
                        <div class="d-flex align-items-center gap-2">
                            <span class="text-muted small"
                                  th:text="${#temporals.format(r.createdAt, 'd MMM, HH:mm')}">date</span>
                            <!-- Reply's author can delete -->
                            <form th:if="${currentUserId != null and currentUserId == r.user.id}"
                                  th:action="@{'/comments/' + ${r.id} + '/delete'}"
                                  method="post" class="m-0"
                                  onsubmit="return confirm('Delete your reply?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger py-0 px-2">Delete</button>
                            </form>
                            <!-- Admin can delete any reply -->
                            <form sec:authorize="hasRole('ADMIN')"
                                  th:unless="${currentUserId != null and currentUserId == r.user.id}"
                                  th:action="@{'/admin/comments/' + ${r.id} + '/delete'}"
                                  method="post" class="m-0">
                                <input type="hidden" name="reason">
                                <button type="submit" class="btn btn-sm btn-outline-warning py-0 px-2"
                                        onclick="return askReason(this.form, 'Delete this reply (admin)?');">
                                    Delete (admin)
                                </button>
                            </form>
                        </div>
                    </div>
                    <p class="mb-0 small" style="white-space: pre-wrap;" th:text="${r.content}">reply</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Admin reason-prompt helper. Tiny script: prompts the admin for a reason,
         validates length, drops it into the form's hidden field, then submits. -->
    <script th:inline="javascript">
        function askReason(form, msg) {
            var r = prompt(msg + '\n\nReason for moderation:');
            if (r === null) return false;
            r = r.trim();
            if (r.length < 3) { alert('Please enter a reason (3+ characters).'); return false; }
            if (r.length > 500) { alert('Keep the reason under 500 characters.'); return false; }
            form.reason.value = r;
            return true;
        }
    </script>

    <!-- New top-level comment form -->
    <form th:action="@{'/posts/' + ${post.id} + '/comments'}"
          th:object="${commentForm}" method="post" class="mt-4 pt-3 border-top">
        <div class="mb-2">
            <label for="content" class="form-label fw-semibold">Add your take</label>
            <textarea id="content" th:field="*{content}" rows="3"
                      class="form-control"
                      th:classappend="${#fields.hasErrors('content')} ? 'is-invalid' : ''"
                      placeholder="Agree, disagree, see something different -- say it."></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('content')}"
                 th:errors="*{content}">Content error</div>
        </div>
        <div class="d-flex justify-content-between align-items-center">
            <a th:href="@{/feed}" class="btn btn-link px-0">← Back to feed</a>
            <button type="submit" class="btn btn-primary">Comment</button>
        </div>
    </form>
</main>

</body>
</html>
