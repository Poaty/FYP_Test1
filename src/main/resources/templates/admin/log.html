<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Moderation log · Movie Community</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4" style="max-width: 960px;">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h1 class="h3 mb-0">Moderation log</h1>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/metrics}" class="btn btn-outline-primary btn-sm">
                Feed metrics →
            </a>
            <a th:href="@{/admin/perf}" class="btn btn-outline-primary btn-sm">
                Performance →
            </a>
        </div>
    </div>
    <p class="text-muted small mb-4">
        Last 100 admin actions, newest first. Includes deletions of posts,
        comments, events, and event messages.
    </p>

    <div th:if="${#lists.isEmpty(actions)}" class="alert alert-light border">
        Nothing here yet — no admin actions recorded.
    </div>

    <div th:unless="${#lists.isEmpty(actions)}" class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-sm mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th class="small">When</th>
                    <th class="small">Admin</th>
                    <th class="small">Action</th>
                    <th class="small">Target</th>
                    <th class="small">Reason</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a : ${actions}">
                    <td class="small text-muted"
                        th:text="${#temporals.format(a.createdAt, 'd MMM yyyy, HH:mm')}">date</td>
                    <td class="small">
                        <span th:if="${a.admin != null}" th:text="${a.admin.username}">user</span>
                        <span th:unless="${a.admin != null}" class="text-muted fst-italic">deleted</span>
                    </td>
                    <td class="small">
                        <code th:text="${a.actionType}">DELETE_POST</code>
                    </td>
                    <td class="small text-muted">
                        <span th:text="${a.targetType}">POST</span>
                        #<span th:text="${a.targetId}">42</span>
                        <div th:if="${a.targetSummary != null}"
                             class="fst-italic mt-1"
                             th:text="${#strings.abbreviate(a.targetSummary, 120)}">summary</div>
                    </td>
                    <td class="small" th:text="${a.reason}">reason</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
