<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feed · Movie Community</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4" style="max-width: 720px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Feed</h1>
        <a th:href="@{/posts/new}" class="btn btn-primary">+ New post</a>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(posts)}" class="card border-0 shadow-sm">
        <div class="card-body text-center py-5">
            <h2 class="h5 mb-2">No posts yet</h2>
            <p class="text-muted mb-3">
                Be the first to share a real opinion on a movie.
            </p>
            <a th:href="@{/posts/new}" class="btn btn-primary">Write one</a>
        </div>
    </div>

    <!-- Page counter (top) -->
    <p th:if="${totalPages > 1}" class="text-muted small mb-3">
        Page <span th:text="${currentPage + 1}">1</span> of <span th:text="${totalPages}">N</span>
    </p>

    <!-- Post cards -->
    <div th:each="post : ${posts}" class="card border-0 shadow-sm mb-3">
        <div class="row g-0">
            <div class="col-3 col-md-2">
                <img th:if="${post.movie.posterUrl != null}" th:src="${post.movie.posterUrl}"
                     class="img-fluid rounded-start" alt="poster"
                     style="width: 100%; height: 100%; object-fit: cover;">
                <div th:unless="${post.movie.posterUrl != null}"
                     class="bg-secondary h-100 d-flex align-items-center justify-content-center text-white small rounded-start">
                    no poster
                </div>
            </div>
            <div class="col-9 col-md-10">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-1">
                        <h5 class="mb-0" th:text="${post.movie.title}">Movie Title</h5>
                        <span class="text-muted small ms-2"
                              th:text="${#temporals.format(post.createdAt, 'd MMM yyyy')}">date</span>
                    </div>
                    <p class="text-muted small mb-2">
                        by <strong th:text="${post.user.username}">someone</strong>
                        <span th:if="${post.movie.year != null}" th:text="' · ' + ${post.movie.year}"> · year</span>
                    </p>
                    <p class="mb-2" style="white-space: pre-wrap;" th:text="${post.content}">Post content</p>
                    <div class="d-flex gap-3 align-items-center small">
                        <span class="text-muted">
                            <span th:text="${commentCounts.get(post.id) ?: 0}">0</span>
                            <span th:text="${(commentCounts.get(post.id) ?: 0) == 1} ? 'comment' : 'comments'">comments</span>
                        </span>
                        <a th:href="@{'/posts/' + ${post.id}}" class="text-decoration-none">
                            View &amp; comment →
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Pagination controls -->
    <nav th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-4">
        <a th:if="${hasPrevious}"
           th:href="@{/feed(page=${currentPage - 1})}"
           class="btn btn-outline-secondary">← Newer</a>
        <span th:unless="${hasPrevious}" class="btn btn-outline-secondary disabled">← Newer</span>

        <span class="text-muted small">
            Page <span th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">N</span>
        </span>

        <a th:if="${hasNext}"
           th:href="@{/feed(page=${currentPage + 1})}"
           class="btn btn-outline-secondary">Older →</a>
        <span th:unless="${hasNext}" class="btn btn-outline-secondary disabled">Older →</span>
    </nav>
</main>

</body>
</html>
