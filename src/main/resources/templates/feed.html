<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feed · Movie Community</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4" style="max-width: 720px;">
    <h1 class="h3 mb-4">Feed</h1>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(posts)}" class="card border-0 shadow-sm">
        <div class="card-body text-center py-5">
            <h2 class="h5 mb-2">No posts yet</h2>
            <p class="text-muted mb-0">
                Once people start sharing their thoughts on movies, they'll show up here.
            </p>
        </div>
    </div>

    <!-- Post list (once we wire up post creation) -->
    <div th:each="post : ${posts}" class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <div class="d-flex justify-content-between mb-2">
                <strong th:text="${post.user.username}">someone</strong>
                <span class="text-muted small"
                      th:text="${#temporals.format(post.createdAt, 'd MMM yyyy')}">date</span>
            </div>
            <h5 class="mb-2" th:text="${post.movie.title}">Movie Title</h5>
            <p class="mb-0" th:text="${post.content}">Post content</p>
        </div>
    </div>
</main>

</body>
</html>
