<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Log in · Movie Community</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-5" style="max-width: 420px;">
    <h1 class="h3 mb-4">Log in</h1>

    <!-- Success message after signup -->
    <div th:if="${param.registered}" class="alert alert-success">
        Account created — log in to continue.
    </div>

    <!-- Error message after a failed login attempt -->
    <div th:if="${param.error}" class="alert alert-danger">
        Wrong username or password.
    </div>

    <!-- Confirmation after logout -->
    <div th:if="${param.logout}" class="alert alert-info">
        You've been logged out.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-control"
                   autocomplete="username" required>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control"
                   autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Log in</button>
    </form>

    <p class="text-muted text-center mt-4 mb-0">
        No account yet? <a th:href="@{/signup}">Sign up</a>.
    </p>
</main>

</body>
</html>
