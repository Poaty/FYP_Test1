<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign up · Movie Community</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-5" style="max-width: 480px;">
    <h1 class="h3 mb-4">Create your account</h1>

    <form th:action="@{/signup}" th:object="${signupForm}" method="post" novalidate>
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" th:field="*{username}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                   autocomplete="username">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
                 th:errors="*{username}">Username error</div>
            <div class="form-text">3–30 characters. Letters, numbers, underscores.</div>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" th:field="*{email}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                   autocomplete="email">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                 th:errors="*{email}">Email error</div>
        </div>

        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" th:field="*{password}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                   autocomplete="new-password">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                 th:errors="*{password}">Password error</div>
            <div class="form-text">At least 8 characters.</div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Create account</button>
    </form>

    <p class="text-muted text-center mt-4 mb-0">
        Already have an account? <a th:href="@{/login}">Log in</a>.
    </p>
</main>

</body>
</html>
